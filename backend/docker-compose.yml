version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: local_postgres
    environment:
      POSTGRES_DB: dashboard
      POSTGRES_USER: sonny
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - backend-net
    volumes:
      - pgdata:/var/lib/postgresql/data

  api-gateway:
    image: nginx:alpine
    container_name: local_gateway
    ports:
      - "8080:8080"
    networks:
      - backend-net
    depends_on:
      - auth-service
      - exchange-service
      - weather-service
      - news-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro

  weather-service:
    build:
      context: ./weather-service
    container_name: weather-service
    ports:
      - "8083:8083"
    networks:
      - backend-net
    depends_on:
      - postgres
    environment:
      # 🔹 기존 유지
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - WEATHER_API_KEY=${WEATHER_API_KEY}

      # ✅ 추가 (Spring이 직접 읽는 변수)
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    networks:
      - backend-net
    depends_on:
      - postgres
    environment:
      # 🔹 기존 유지
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS}
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000

      # ✅ 추가
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

  exchange-service:
    build:
      context: ./exchange-service
    container_name: exchange-service
    ports:
      - "8082:8082"
    networks:
      - backend-net
    depends_on:
      - postgres
    environment:
      # 🔹 기존 유지
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - EXCHANGE_API_KEY=${EXCHANGE_API_KEY}

      # ✅ 추가
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}

  # ✅ news-nlp-service: 다른 서비스들과 동일하게 "container_name + networks + ports + (선택)depends_on" 적용
#  news-nlp-service:
#    build:
#      context: ml-infer
#    container_name: news-nlp-service
#    ports:
#      - "8090:8090"
#    networks:
#      - backend-net
#    environment:
#      - MODEL_LOCAL_DIR=/models/sentiment
#      # - MODEL_S3_URI=s3://your-bucket/your-prefix

  news-service:
    build:
      context: ./news-service
    container_name: news-service
    ports:
      - "8084:8084"
    networks:
      - backend-net
    depends_on:
      - postgres
#      - news-nlp-service
    environment:
      - SERVER_PORT=8084
      - SPRING_PROFILES_ACTIVE=dev

      # ✅ .env 그대로 사용
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}

      # ✅ dev CORS 매핑 키는 CORS_ALLOWED_ORIGINS로 받으니까 브릿지 처리
      - CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}

      # ✅ News 설정 (없으면 기본값 사용하도록)
      - NEWS_RSS_URL=${NEWS_RSS_URL:-https://news.google.com/rss?hl=ko&gl=KR&ceid=KR:ko}
      - NEWS_TOP_N=${NEWS_TOP_N:-10}
      - NEWS_TREND_MAX_KEYWORDS=${NEWS_TREND_MAX_KEYWORDS:-5}

      # ✅ NLP 내부 통신
      - NLP_BASE_URL=http://news-nlp-service:8090

      # ✅ WebClient 타임아웃
      - HTTP_CONNECT_TIMEOUT_MS=${HTTP_CONNECT_TIMEOUT_MS:-2000}
      - HTTP_READ_TIMEOUT_MS=${HTTP_READ_TIMEOUT_MS:-5000}

networks:
  backend-net:

volumes:
  pgdata:
