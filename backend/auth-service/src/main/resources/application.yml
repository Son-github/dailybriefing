server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: native

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKERNATION_FAIL_TIMEOUT:0}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      fail-on-empty-beans: false

# ✅ JWT 키는 "jwt.*"로 통일 (JwtTokenProvider @Value("${jwt.secret}") 와 일치)
jwt:
  secret: ${JWT_SECRET}
  access-validity-ms: ${JWT_ACCESS_VALIDITY_MS:3600000}        # 1h
  refresh-validity-ms: ${JWT_REFRESH_VALIDITY_MS:604800000}    # 7d

management:
  endpoints:
    web:
      base-path: /auth/actuator
      exposure:
        include: "health,info"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    org.springframework.security: info
    org.springframework.web: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  cors:
    # ✅ 운영은 반드시 CloudFront 도메인 넣기(ENV로 강제하는 게 안전)
    # 예: https://dxxxx.cloudfront.net
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
