spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # 로컬 단독 실행이면 localhost / compose면 postgres(서비스명)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/dashboard}
    username: ${SPRING_DATASOURCE_USERNAME:sonny}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:0}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: native

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.security: info

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me-please-dev-secret-change-me}
  access-validity-ms: ${JWT_ACCESS_VALIDITY_MS:3600000}
  refresh-validity-ms: ${JWT_REFRESH_VALIDITY_MS:604800000}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  cookie:
    secure: false
