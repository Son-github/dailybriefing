server:
  # ECS에서 SERVER_PORT=8083 로 주입, 없으면 8083
  port: ${SERVER_PORT:8083}
  forward-headers-strategy: native

spring:
  datasource:
    # ✅ Terraform이 SPRING_DATASOURCE_URL 로 주입
    # 예) jdbc:postgresql://${module.rds.endpoint}:5432/${module.rds.db_name}?sslmode=require
    url: ${SPRING_DATASOURCE_URL}
    # ✅ RDS 관리형 시크릿에서 ECS가 주입
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 초기 연결 지연 시 실패하지 않도록
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:0}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# ALB 헬스체크용 actuator
management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      probes:
        enabled: true

external:
  weather:
    # 기본값은 공공데이터포털 초단기예보, 필요시 ENV로 덮어쓰기
    url: ${WEATHER_API_URL:http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtFcst}
    # 🔐 Secrets Manager → ECS secrets 로 주입됨 (Plaintext 값만 저장)
    service-key: ${WEATHER_API_KEY}

app:
  data-refresh-ms: ${DATA_REFRESH_INTERVAL_MS:600000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  http:
    connect-timeout-ms: ${HTTP_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${HTTP_READ_TIMEOUT_MS:5000}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace
    org.springframework.security: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
