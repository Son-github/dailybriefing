server:
  # 로컬 docker에서는 기본 8084
  port: ${SERVER_PORT:8083}
  forward-headers-strategy: native

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # ✅ docker-compose에서는 DB 호스트가 localhost가 아니라 서비스명 'postgres'
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKERNATION_FAIL_TIMEOUT:0}

  jpa:
    hibernate:
      # 로컬 개발은 update 기본 (원하면 create-drop로 바꿔도 됨)
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mvc:
    cors:
      mappings:
        "[/**]":
          # 로컬 React(3000) 기준
          allowed-origins: ${CORS_ALLOWED_ORIGINS}
          allowed-methods: "GET,POST,OPTIONS"
          allowed-headers: "*"
          allow-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

external:
  weather:
    # 기본값은 공공데이터포털 초단기예보, 필요시 ENV로 덮어쓰기
    url: ${WEATHER_API_URL:http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtFcst}
    # 🔐 Secrets Manager → ECS secrets 로 주입됨 (Plaintext 값만 저장)
    service-key: ${WEATHER_API_KEY}

app:
  data-refresh-ms: ${DATA_REFRESH_INTERVAL_MS:600000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  http:
    connect-timeout-ms: ${HTTP_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${HTTP_READ_TIMEOUT_MS:5000}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace
    org.springframework.security: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
