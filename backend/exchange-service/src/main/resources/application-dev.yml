server:
  # 로컬 docker에서는 기본 8082
  port: ${SERVER_PORT:8082}
  forward-headers-strategy: native

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # ✅ docker-compose에서는 DB 호스트가 localhost가 아니라 서비스명 'postgres'
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKERNATION_FAIL_TIMEOUT:0}

  jpa:
    hibernate:
      # 로컬 개발은 update 기본 (원하면 create-drop로 바꿔도 됨)
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mvc:
    cors:
      mappings:
        "[/**]":
          # 로컬 React(3000) 기준
          allowed-origins: ${CORS_ALLOWED_ORIGINS}
          allowed-methods: "GET,POST,OPTIONS"
          allowed-headers: "*"
          allow-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

external:
  exchange:
    api-url: ${EXCHANGE_API_URL:https://oapi.koreaexim.go.kr/site/program/financial/exchangeJSON}
    service-key: ${EXCHANGE_API_KEY}
    data: ${EXCHANGE_DATA_CODE:AP01}
    timeout-ms: ${EXCHANGE_API_TIMEOUT_MS:5000}

exchange:
  cache-ttl-seconds: 60

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace
    org.springframework.security: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
