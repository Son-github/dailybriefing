events {}

http {
  server {
    listen 8080;

    # 프록시 공통 헤더(CloudFront/ALB 뒤 운영과 비슷하게)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /auth/ {
      proxy_pass http://auth-service:8081;
    }

    location /exchange/ {
      proxy_pass http://exchange-service:8082;
    }

    location /exchange {
      proxy_pass http://exchange-service:8082;
    }

    location /weather/ {
      proxy_pass http://weather-service:8083;
    }

    location /news/ {
      proxy_pass http://news-service:8084;
    }

    location /news {
      proxy_pass http://news-service:8084;
    }
  }
}
