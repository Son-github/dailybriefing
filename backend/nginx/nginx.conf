events {}

http {
  server {
    listen 8080;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Cookie $http_cookie;
    proxy_set_header Authorization $http_authorization;  # ✅ 핵심

    location ^~ /auth/ {
      proxy_pass http://auth-service:8081;
    }

# /exchange 로 오면 바로 upstream으로 넘기고, 절대 redirect 하지 않게
    location = /exchange {
      proxy_pass http://exchange-service:8082/exchange;
    }

    location ^~ /exchange/ {
      proxy_pass http://exchange-service:8082;
    }

    location ^~ /weather/ {
      proxy_pass http://weather-service:8083;
    }

    location ^~ /news/ {
      proxy_pass http://news-service:8084;
    }
  }
}
