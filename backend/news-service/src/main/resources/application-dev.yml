server:
  # 로컬 docker에서는 기본 8084
  port: ${SERVER_PORT:8084}
  forward-headers-strategy: native

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    # ✅ docker-compose 환경: 서비스명 postgres로 접근
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: ${SPRING_DATASOURCE_HIKERNATION_FAIL_TIMEOUT:0}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mvc:
    cors:
      mappings:
        "[/**]":
          # 로컬 React(3000) 기준 (예: http://localhost:3000)
          allowed-origins: ${CORS_ALLOWED_ORIGINS}
          allowed-methods: "GET,POST,OPTIONS"
          allowed-headers: "*"
          allow-credentials: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  data-refresh-ms: ${DATA_REFRESH_INTERVAL_MS:600000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  news:
    rss-url: ${NEWS_RSS_URL:https://news.google.com/rss?hl=ko&gl=KR&ceid=KR:ko}
    top-n: ${NEWS_TOP_N:10}
    trend:
      max-keywords: ${NEWS_TREND_MAX_KEYWORDS:5}

  http:
    connect-timeout-ms: ${HTTP_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${HTTP_READ_TIMEOUT_MS:5000}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace
    org.springframework.security: info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
