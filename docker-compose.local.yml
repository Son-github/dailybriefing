# 로컬 개발 전용 설정이다. AWS 운영 환경에서는 사용하지 않는다.
x-backend-local: &backend-local
  depends_on:
    postgres:
      condition: service_healthy
  environment: &backend-environment
    SPRING_PROFILES_ACTIVE: dev
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
    SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    CORS_ALLOWED_ORIGINS: http://localhost:3000
    DATA_REFRESH_INTERVAL_MS: 600000

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-net

  api-gateway:
    ports:
      - "8080:8080"

  auth-service:
    <<: *backend-local
    ports:
      - "8081:8081"
    environment:
      <<: *backend-environment
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_VALIDITY_MS: ${JWT_ACCESS_VALIDITY_MS}
      JWT_REFRESH_VALIDITY_MS: ${JWT_REFRESH_VALIDITY_MS}

  exchange-service:
    <<: *backend-local
    ports:
      - "8082:8082"
    environment:
      <<: *backend-environment
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY}
      KIS_APP_KEY: ${KIS_APP_KEY:-}
      KIS_APP_SECRET: ${KIS_APP_SECRET:-}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      US_MARKET_SYMBOL: ${US_MARKET_SYMBOL:-IXIC}

  weather-service:
    <<: *backend-local
    ports:
      - "8083:8083"
    environment:
      <<: *backend-environment
      WEATHER_API_KEY: ${WEATHER_API_KEY}

  news-service:
    <<: *backend-local
    ports:
      - "8084:8084"
    environment:
      <<: *backend-environment
      NEWS_RSS_URL: ${NEWS_RSS_URL:-https://news.google.com/rss?hl=ko&gl=KR&ceid=KR:ko}
      NEWS_TOP_N: ${NEWS_TOP_N:-10}
      NEWS_TREND_MAX_KEYWORDS: ${NEWS_TREND_MAX_KEYWORDS:-5}
      HTTP_CONNECT_TIMEOUT_MS: ${HTTP_CONNECT_TIMEOUT_MS:-2000}
      HTTP_READ_TIMEOUT_MS: ${HTTP_READ_TIMEOUT_MS:-5000}

  frontend:
    ports:
      - "3000:80"

volumes:
  pgdata:
