name: Deploy backend services to ECS

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2
  CLUSTER_NAME: dailybriefing-cluster
  ECR_REPO_PREFIX: 953013523670.dkr.ecr.ap-northeast-2.amazonaws.com/dailybriefing

jobs:
  deploy:
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, exchange-service, weather-service, news-service]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test service
        working-directory: backend/${{ matrix.service }}
        run: |
          chmod +x ./gradlew
          ./gradlew test

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        working-directory: backend/${{ matrix.service }}
        env:
          IMAGE_URI: ${{ env.ECR_REPO_PREFIX }}/${{ matrix.service }}
          GIT_SHA: ${{ github.sha }}
        run: |
          docker build -t "${IMAGE_URI}:latest" -t "${IMAGE_URI}:${GIT_SHA}" .
          docker push "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:${GIT_SHA}"

      - name: Deploy service
        run: |
          aws ecs update-service \
            --cluster "${CLUSTER_NAME}" \
            --service "dailybriefing-${{ matrix.service }}" \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster "${CLUSTER_NAME}" \
            --services "dailybriefing-${{ matrix.service }}"
