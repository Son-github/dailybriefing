# 공통 컨테이너 구성이다. 로컬 실행 시 docker-compose.local.yml과 함께 사용한다.
# AWS 운영 배포는 이 파일을 사용하지 않고 terraform/의 ECS 정의만 사용한다.
services:
  api-gateway:
    image: nginx:alpine
    depends_on:
      - auth-service
      - exchange-service
      - weather-service
      - news-service
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend-net

  auth-service:
    build:
      context: ./backend/auth-service
    networks:
      - backend-net

  exchange-service:
    build:
      context: ./backend/exchange-service
    networks:
      - backend-net

  weather-service:
    build:
      context: ./backend/weather-service
    networks:
      - backend-net

  news-service:
    build:
      context: ./backend/news-service
    networks:
      - backend-net

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api-gateway
    networks:
      - backend-net

networks:
  backend-net:
